name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      # Non-strict: real `error`-severity violations fail the job, while
      # warnings (long user-facing strings, standard test idioms) are surfaced
      # as guidance rather than gating the merge.
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # Secrets.swift (holding the Gemini API key) is gitignored. CI writes a
      # placeholder with an empty key so the project compiles; no network call
      # is exercised during a build/unit-test run.
      - name: Write stub Secrets.swift
        run: |
          cat > "Party Watcher/Secrets.swift" <<'SWIFT'
          import Foundation
          // CI placeholder — real key is provided locally and gitignored.
          enum Secrets {
              static let geminiAPIKey = ""
          }
          SWIFT

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Party Watcher.xcodeproj" \
            -scheme "Party Watcher" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro' \
            -derivedDataPath .build/DerivedData \
            -only-testing:"Party WatcherTests" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      # Summarize line coverage for the app target from the .xcresult bundle and
      # publish it to the GitHub Actions run summary. Informational only — does
      # not gate the merge.
      - name: Report code coverage
        if: always()
        run: |
          XCRESULT=$(find .build/DerivedData/Logs/Test -name '*.xcresult' | head -1)
          if [ -z "$XCRESULT" ]; then
            echo "No .xcresult found; skipping coverage report."
            exit 0
          fi
          echo "### Code coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          xcrun xccov view --report "$XCRESULT" | head -40 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  ui-tests:
    name: UI Tests (iOS Simulator)
    runs-on: macos-15
    # End-to-end XCUITests are slower and launch the full app, so they run in
    # their own job and don't gate the fast unit signal. continue-on-error keeps
    # a flaky simulator interaction from blocking a merge.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write stub Secrets.swift
        run: |
          cat > "Party Watcher/Secrets.swift" <<'SWIFT'
          import Foundation
          // CI placeholder — real key is provided locally and gitignored.
          enum Secrets {
              static let geminiAPIKey = ""
          }
          SWIFT

      - name: UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Party Watcher.xcodeproj" \
            -scheme "Party Watcher" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro' \
            -derivedDataPath .build/DerivedData \
            -only-testing:"Party WatcherUITests" \
            CODE_SIGNING_ALLOWED=NO
