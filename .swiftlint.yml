# SwiftLint configuration for SafeWalk.
#
# CI runs `swiftlint lint` non-strict: real `error`-severity violations fail the
# job, warnings are surfaced as guidance. Warnings that remain are deliberate —
# long user-facing string literals (chat copy, settings footers) and standard
# test idioms (`URL(string:)!` in a URLProtocol stub, `class`-scoped XCTest
# members) that read better as-is than mangled to satisfy the linter.

included:
  - "Party Watcher"
  - "Party WatcherTests"
  - "Party WatcherUITests"

excluded:
  - .build
  - "**/Secrets.swift"
  - "**/Secrets.example.swift"

# High-value opt-in rules beyond the defaults.
opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - explicit_init
  - first_where
  - last_where
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  # Xcode generates the @main type as `Party_WatcherApp`; the underscore is
  # imposed by the project name and is not something we control.
  - type_name
  # Idiomatic SwiftUI constantly passes a content closure plus modifiers like
  # `onChange`/`onAppear` as trailing closures (e.g. `Map { … }.onChange { … }`).
  # This rule fights that convention with no real readability gain.
  - multiple_closures_with_trailing_closure
  # `= nil` on optional stored properties reads more explicitly for the timer
  # ivars; harmless and a matter of taste.
  - implicit_optional_initialization

line_length:
  warning: 140
  error: 250
  ignores_comments: true
  ignores_urls: true

identifier_name:
  # Allow short, conventional locals (e.g. `d` for a decision, `s` for a
  # session) that read clearly in focused test bodies.
  min_length:
    warning: 1
    error: 1

# The MVVM refactor decomposed the former 1008-line god view into a view model
# plus small subviews; the largest file is now the ~400-line view model. These
# thresholds sit just above that so growth is flagged early.
file_length:
  warning: 500
  error: 700
type_body_length:
  warning: 450
  error: 600

nesting:
  # The Gemini response model nests Codable structs (Response > Candidate >
  # Content) to mirror the JSON shape — a common and readable pattern.
  type_level: 3
